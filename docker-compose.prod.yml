services:
  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/${NGINX_CONFIG:-chainduel3d.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    networks:
      - app

  server:
    image: ${IMAGE_PREFIX:-chainduel3d}/server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  client:
    image: ${IMAGE_PREFIX:-chainduel3d}/client:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

networks:
  app:
    driver: bridge
